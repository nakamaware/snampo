name: snampo
description: "A new Flutter project."
publish_to: "none"
version: 0.1.1

environment:
  sdk: ">=3.7.0 <4.0.0"

dependencies:
  camera: ^0.11.2
  dio: ^5.4.0
  flutter:
    sdk: flutter
  flutter_compass: ^0.8.1
  flutter_hooks: ^0.21.3
  flutter_polyline_points: ^2.0.0
  flutter_riverpod: ^3.1.0
  freezed_annotation: ^3.0.0
  geolocator: ^10.1.0
  go_router: ^14.0.0
  google_fonts: ^6.1.0
  google_maps_flutter: ^2.5.3
  hooks_riverpod: ^3.1.0
  http: ^1.2.0
  image_picker: ^1.0.7
  json_annotation: ^4.8.1
  loading_animation_widget: ^1.2.0+4
  path: ^1.9.0
  path_provider: ^2.1.5
  riverpod: ^3.1.0
  riverpod_annotation: ^4.0.0
  riverpod_sqflite: ^0.4.0
  # 生成されたAPIクライアント (OpenAPIスキーマから自動生成)
  snampo_api:
    path: ../packages/snampo_api
  sqflite: ^2.4.2
  url_launcher: ^6.3.2

dev_dependencies:
  build_runner: ^2.4.8
  flutter_launcher_icons: ^0.14.4
  flutter_test:
    sdk: flutter
  freezed: ^3.0.0
  json_serializable: ^6.7.1
  riverpod_generator: ^4.0.0
  very_good_analysis: ^5.1.0

dependency_overrides:
  # Dart 3.5+ で削除された UnmodifiableUint8ListView を使わないように
  # win32 を 5.5.1 以降に強制的に上げる
  win32: ^5.5.1
  # snampo_apiが古いhttpバージョンに依存しているため一時的にオーバーライド
  http: ^1.2.0

flutter:
  uses-material-design: true
  assets:
    - images/

# アプリアイコン生成: dart run flutter_launcher_icons
# https://pub.dev/packages/flutter_launcher_icons
flutter_launcher_icons:
  android: true
  ios: true
  remove_alpha_ios: true
  image_path: assets/images/icon.png
  # Android 8.0+ アダプティブアイコン (背景はアイコン画像のティールに合わせる)
  adaptive_icon_background: "#1E9B93"
  adaptive_icon_foreground: assets/images/icon.png
